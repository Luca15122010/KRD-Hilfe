<form id="patientForm" class="form-stack">
  <div class="form-grid">
    <label>Name<input name="name" type="text" /></label>
    <label>Alter<input name="alter" type="text" /></label>
    <label>Geburtsdatum<input name="geburtsdatum" type="date" /></label>
    <label>Datum<input name="datum" type="date" /></label>
    <label>Uhrzeit<input name="uhrzeit" type="time" /></label>
    <label>Orientierung<input name="orientierung" type="text" /></label>
  </div>

  <label>Was ist passiert?<textarea name="was_passiert"></textarea></label>

  <div class="checks cols2">
    <label><input type="checkbox" name="schmerzen" value="ja" /> Schmerzen</label>
    <label><input type="checkbox" name="schwindel" value="ja" /> Schwindel</label>
    <label><input type="checkbox" name="uebelkeit" value="ja" /> Übelkeit</label>
    <label><input type="checkbox" name="atemnot" value="ja" /> Atemnot</label>
  </div>

  <div class="form-grid">
    <label>Schmerzskala (0-10)<input name="schmerzskala" type="number" min="0" max="10" /></label>
    <label>Schmerzmittel<input name="schmerzmittel" type="text" /></label>
  </div>

  <label>Schmerzbeschreibung<textarea name="schmerzbeschreibung"></textarea></label>
  <label>Krankenhaus<textarea name="krankenhaus"></textarea></label>

  <div class="page-actions">
    <button class="btn" type="submit">Speichern</button>
    <a class="btn ghost" href="gespeichert.html">Zu den Einträgen</a>
  </div>
</form>
