<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bericht</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">EinsatzDoku</div>
    <nav class="topnav">
      <a href="index.html">Start</a>
      <a href="patientenfrage.html">Patientenfrage</a>
      <a class="active" href="bericht.html">Bericht</a>
      <a href="xabcde.html">xABCDE</a>
      <a href="gespeichert.html">Gespeichert</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="card form-page">
      <div class="section-head">
        <h1>Anamnesebrief / Bericht</h1>
        <p>Ausführlicher Bericht für die Dokumentation.</p>
      </div>

      <form id="reportForm" class="form-stack">
        <div class="form-grid">
          <label>Name<input name="name" type="text" /></label>
          <label>Geburtsdatum<input name="geburtsdatum" type="date" /></label>
          <label>Alter<input name="alter" type="text" /></label>
          <label>Datum<input name="datum" type="date" /></label>
          <label>Uhrzeit<input name="uhrzeit" type="time" /></label>
          <label>Ort des Einsatzes<input name="ort" type="text" /></label>
        </div>

        <label>Anlass / Beschwerden<textarea name="anlass"></textarea></label>
        <label>Vorerkrankungen<textarea name="vorerkrankungen"></textarea></label>
        <label>Medikamente<textarea name="medikamente"></textarea></label>
        <label>Allergien<textarea name="allergien"></textarea></label>
        <label>Verlauf / Maßnahmen<textarea name="verlauf"></textarea></label>
        <label>Beurteilung / Verdacht<textarea name="beurteilung"></textarea></label>
        <label>Bemerkungen<textarea name="bemerkungen"></textarea></label>

        <div class="page-actions">
          <button class="btn" type="submit">Bericht speichern</button>
          <a class="btn ghost" href="gespeichert.html">Zu den Einträgen</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
